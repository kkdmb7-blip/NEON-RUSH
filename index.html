<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Rush: 100 Stages</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00de;
            --neon-purple: #bc13fe;
            --bg-color: #050509;
            --text-color: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
            user-select: none;
            touch-action: none;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .stat {
            font-size: 1.2rem;
            margin-bottom: 5px;
            font-weight: bold;
        }

        #stageIndicator {
            color: var(--neon-pink);
        }

        #progressBarContainer {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid var(--neon-purple);
            box-shadow: 0 0 10px rgba(188, 19, 254, 0.5);
        }

        #progressBar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-pink));
            box-shadow: 0 0 15px var(--neon-pink);
            transition: width 0.1s ease-out;
        }

        /* Screens */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(5, 5, 9, 0.9);
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .hidden { display: none !important; }

        h1 {
            font-size: 4rem;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            background: linear-gradient(var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--neon-blue));
        }

        p { font-size: 1.5rem; margin-bottom: 40px; }

        button {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        button:hover {
            background: var(--neon-blue);
            color: var(--bg-color);
            box-shadow: 0 0 30px var(--neon-blue);
        }

        #gameOverTitle { color: #ff3333; filter: drop-shadow(0 0 15px #ff3333); }
        #finalScore { color: var(--neon-green); font-size: 2rem; margin-top: 10px;}

        /* Combo Feedback */
        #comboFeedback {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: bold;
            color: var(--neon-pink);
            text-shadow: 0 0 20px var(--neon-pink);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s, transform 0.3s ease-out;
        }

        .animate-combo {
            opacity: 1 !important;
            transform: translate(-50%, -60%) scale(1.2) !important;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <div class="stat" id="stageIndicator">STAGE: 001/100</div>
        <div class="stat">SCORE: <span id="scoreValue">00000</span></div>
    </div>

    <div id="progressBarContainer">
        <div id="progressBar"></div>
    </div>

    <div id="comboFeedback">PERFECT!</div>

    <div id="startScreen" class="screen">
        <h1>NEON RUSH</h1>
        <p>타이밍에 맞춰 클릭해 핵을 파괴하세요.</p>
        <button onclick="startGame()">GAME START</button>
    </div>

    <div id="gameOverScreen" class="screen hidden">
        <h1 id="gameOverTitle">GAME OVER</h1>
        <p>단계를 넘어섰습니다.</p>
        <div id="finalStage" class="stat">최종 단계: 001</div>
        <div id="finalScore" class="stat">최종 점수: 00000</div>
        <br><br>
        <button onclick="startGame()">RETRY</button>
    </div>

    <div id="winScreen" class="screen hidden">
        <h1 style="color: gold; filter: drop-shadow(0 0 15px gold);">LEGEND CLEAR</h1>
        <p>100단계를 모두 정복했습니다!</p>
        <button onclick="startGame()">PLAY AGAIN</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiStage = document.getElementById('stageIndicator');
        const uiScore = document.getElementById('scoreValue');
        const progressBar = document.getElementById('progressBar');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const winScreen = document.getElementById('winScreen');
        const comboFeedback = document.getElementById('comboFeedback');

        // Game State
        let gameState = 'START'; // START, PLAYING, GAMEOVER, WIN
        let currentStage = 1;
        let score = 0;
        let combo = 0;
        let particles = [];
        let rings = [];
        let projectile = null;
        let core = { r: 25, flash: 0 };
        let screenShake = 0;

        // Constants for Neon Colors
        const COLORS = {
            blue: '#00f2ff',
            pink: '#ff00de',
            purple: '#bc13fe',
            green: '#39ff14',
            red: '#ff3333'
        };

        // Resize Canvas
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (gameState === 'PLAYING') initStage(currentStage);
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Classes ---

        class Ring {
            constructor(radius, speed, gapSize, color) {
                this.radius = radius;
                this.speed = speed;
                this.gapSize = gapSize; // Radius of gap
                this.color = color;
                this.angle = Math.random() * Math.PI * 2;
                this.gapAngle = Math.random() * Math.PI * 2;
            }

            update(dt) {
                this.angle += this.speed * dt;
            }

            draw() {
                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(this.angle);

                // Draw Ring Arc (everything except the gap)
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, this.gapSize / 2, Math.PI * 2 - this.gapSize / 2);
                ctx.lineWidth = 6;
                ctx.strokeStyle = this.color;
                ctx.lineCap = 'round';
                
                // Neon Glow
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.stroke();
                
                ctx.restore();
            }

            checkCollision(projAngle) {
                // Normalize angles to 0-2PI
                let normalizedProj = projAngle % (Math.PI * 2);
                if (normalizedProj < 0) normalizedProj += Math.PI * 2;

                let normalizedRingStart = (this.angle + this.gapSize / 2) % (Math.PI * 2);
                let normalizedRingEnd = (this.angle + Math.PI * 2 - this.gapSize / 2) % (Math.PI * 2);

                // Collision logic: is projectile angle NOT in the gap?
                // This is slightly tricky due to angle wrapping.
                let inGap = false;
                if (normalizedRingStart < normalizedRingEnd) {
                    // Gap does not wrap around 0
                    if (normalizedProj > normalizedRingStart && normalizedProj < normalizedRingEnd) {
                        inGap = true;
                    }
                } else {
                    // Gap wraps around 0
                    if (normalizedProj > normalizedRingStart || normalizedProj < normalizedRingEnd) {
                        inGap = true;
                    }
                }
                return !inGap; // Collide if NOT in gap
            }
        }

        class Projectile {
            constructor() {
                this.speed = 800;
                this.r = 8;
                this.distance = Math.max(canvas.width, canvas.height) / 2;
                this.angle = 0; // Will be set on shoot
                this.active = false;
            }

            shoot() {
                if (!this.active) {
                    this.active = true;
                    this.distance = Math.max(canvas.width, canvas.height) / 2;
                    // Aim toward center
                }
            }

            update(dt) {
                if (this.active) {
                    this.distance -= this.speed * dt;
                    if (this.distance <= core.r) {
                        this.active = false;
                        handleCoreHit();
                    }
                }
            }

            draw() {
                if (!this.active) return;
                const x = canvas.width / 2 + Math.cos(this.angle) * this.distance;
                const y = canvas.height / 2 + Math.sin(this.angle) * this.distance;

                ctx.beginPath();
                ctx.arc(x, y, this.r, 0, Math.PI * 2);
                ctx.fillStyle = COLORS.blue;
                ctx.shadowBlur = 20;
                ctx.shadowColor = COLORS.blue;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 100 + 50;
                this.life = 1; // 1 to 0
                this.decay = Math.random() * 1 + 1;
                this.r = Math.random() * 3 + 1;
            }

            update(dt) {
                this.x += Math.cos(this.angle) * this.speed * dt;
                this.y += Math.sin(this.angle) * this.speed * dt;
                this.life -= this.decay * dt;
                this.r *= 0.97;
            }

            draw() {
                if (this.life <= 0) return;
                ctx.globalAlpha = this.life;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }
        }

        // --- Core Functions ---

        function initStage(stage) {
            rings = [];
            projectile = new Projectile();
            
            // --- DIFFICULTY SCALING ALGORITHM (1-100) ---
            // As stage goes up: more rings, faster speed, smaller gaps.
            
            const numRings = Math.min(4, 1 + Math.floor(stage / 25)); // 1 ring (1-24), 2 (25-49), 3 (50-74), 4 (75-100)
            const baseSpeed = 1.0 + (stage * 0.05); // Speed increases linearly
            const baseGapSize = Math.max(0.3, 1.5 - (stage * 0.012)); // Gaps get smaller
            const colors = [COLORS.blue, COLORS.purple, COLORS.pink, '#ffffff'];

            for (let i = 0; i < numRings; i++) {
                const radius = 60 + (i * 35);
                // Alternate direction
                const speed = (i % 2 === 0 ? 1 : -1) * (baseSpeed + (i * 0.2)); 
                const gapSize = baseGapSize - (i * 0.1); // Inner rings have smaller gaps
                rings.push(new Ring(radius, speed, gapSize, colors[i % colors.length]));
            }

            // UI Update
            uiStage.innerText = `STAGE: ${String(stage).padStart(3, '0')}/100`;
            progressBar.style.width = `${(stage / 100) * 100}%`;
        }

        function startGame() {
            gameState = 'PLAYING';
            currentStage = 1;
            score = 0;
            combo = 0;
            uiScore.innerText = '00000';
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            winScreen.classList.add('hidden');
            initStage(currentStage);
            requestAnimationFrame(gameLoop);
        }

        function triggerComboFeedback(text) {
            comboFeedback.innerText = text;
            comboFeedback.classList.add('animate-combo');
            setTimeout(() => {
                comboFeedback.classList.remove('animate-combo');
            }, 300);
        }

        function handleCoreHit() {
            core.flash = 1; // Activate flash
            createExplosion(canvas.width / 2, canvas.height / 2, COLORS.green, 30);
            
            // Score Calculation
            combo++;
            let comboBonus = Math.floor(combo / 3);
            let stageScore = 100 + (currentStage * 10) + (comboBonus * 50);
            score += stageScore;
            uiScore.innerText = String(score).padStart(5, '0');

            // Feedback
            if (combo >= 3) {
                triggerComboFeedback(`COMBO x${combo}!`);
            } else {
                triggerComboFeedback('PERFECT!');
            }

            // Next Stage or Win
            setTimeout(() => {
                if (currentStage < 100) {
                    currentStage++;
                    initStage(currentStage);
                } else {
                    endGame(true);
                }
            }, 150);
        }

        function endGame(isWin) {
            gameState = isWin ? 'WIN' : 'GAMEOVER';
            if (isWin) {
                winScreen.classList.remove('hidden');
            } else {
                document.getElementById('finalStage').innerText = `최종 단계: ${String(currentStage).padStart(3, '0')}`;
                document.getElementById('finalScore').innerText = `최종 점수: ${String(score).padStart(5, '0')}`;
                gameOverScreen.classList.remove('hidden');
            }
        }

        function createExplosion(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        // --- Input Handling ---

        function handleInput(e) {
            if (gameState !== 'PLAYING') return;
            
            if (projectile && !projectile.active) {
                // Determine angle based on input position relative to center
                const rect = canvas.getBoundingClientRect();
                const inputX = (e.touches ? e.touches.clientX : e.clientX) - rect.left;
                const inputY = (e.touches ? e.touches.clientY : e.clientY) - rect.top;
                
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                
                projectile.angle = Math.atan2(inputY - centerY, inputX - centerX);
                projectile.shoot();
            }
        }

        window.addEventListener('mousedown', handleInput);
        window.addEventListener('touchstart', handleInput);

        // --- Main Game Loop ---

        let lastTime = 0;
        function gameLoop(timestamp) {
            if (gameState !== 'PLAYING') return;
            const dt = (timestamp - lastTime) / 1000; // Delta time in seconds
            lastTime = timestamp;

            // Clear Background
            ctx.fillStyle = var('--bg-color');
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Screen Shake
            if (screenShake > 0) {
                ctx.save();
                ctx.translate(Math.random() * screenShake - screenShake / 2, Math.random() * screenShake - screenShake / 2);
                screenShake *= 0.9;
                if (screenShake < 0.5) screenShake = 0;
            }

            // Update & Draw Rings
            rings.forEach(ring => {
                ring.update(dt);
                ring.draw();
            });

            // Update & Draw Projectile & Check Collision with Rings
            if (projectile && projectile.active) {
                projectile.update(dt);
                projectile.draw();

                // Collision check against ALL rings when projectile is moving inwards
                for (let ring of rings) {
                    if (projectile.distance < ring.radius + projectile.r + 5 && 
                        projectile.distance > ring.radius - projectile.r - 5) {
                        
                        if (ring.checkCollision(projectile.angle)) {
                            // HIT A RING! GAME OVER
                            projectile.active = false;
                            combo = 0;
                            screenShake = 20; // Intense shake
                            createExplosion(
                                canvas.width/2 + Math.cos(projectile.angle) * ring.radius,
                                canvas.height/2 + Math.sin(projectile.angle) * ring.radius,
                                COLORS.red, 20
                            );
                            setTimeout(() => endGame(false), 300);
                            return; // Stop checking other rings
                        }
                    }
                }
            }

            // Draw Core
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, core.r, 0, Math.PI * 2);
            let coreColor = core.flash > 0 ? COLORS.green : COLORS.purple;
            ctx.fillStyle = coreColor;
            
            // Core Glow
            ctx.shadowBlur = core.flash > 0 ? 40 : 20;
            ctx.shadowColor = coreColor;
            ctx.fill();
            ctx.shadowBlur = 0; // Reset blur
            
            // Handle core flash decay
            if (core.flash > 0) core.flash -= dt * 5;

            // Update & Draw Particles
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update(dt);
                p.draw();
            });

            if (screenShake > 0) ctx.restore();

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
