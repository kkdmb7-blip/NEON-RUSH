<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON RUSH</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  width:100vw; height:100vh;
  overflow:hidden;
  font-family:'Courier New',monospace;
  touch-action:none;
}
#wrap {
  position:relative;
  width:min(100vw,100vh);
  height:min(100vw,100vh);
  max-width:600px;
  max-height:600px;
}
canvas { width:100%; height:100%; display:block; cursor:pointer; }
#ui {
  position:absolute; top:0; left:0; right:0;
  display:flex; justify-content:space-between;
  padding:12px 16px;
  pointer-events:none; z-index:2;
}
.ui-text {
  color:#0ff; font-size:clamp(11px,2.5vw,15px);
  font-weight:bold; text-shadow:0 0 8px #0ff; letter-spacing:2px;
}
#progress-wrap {
  position:absolute; bottom:10px; left:10px; right:10px;
  height:6px; background:rgba(255,255,255,0.1);
  border-radius:3px; overflow:hidden; pointer-events:none; z-index:2;
}
#progress-bar {
  height:100%; background:linear-gradient(90deg,#0ff,#f0f);
  border-radius:3px; box-shadow:0 0 8px #0ff; width:1%; transition:width 0.3s;
}
#flash { position:absolute; inset:0; pointer-events:none; z-index:5; opacity:0; }
#overlay {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:14px; z-index:10; background:rgba(0,0,0,0.88);
}
.ot { font-size:clamp(26px,7vw,50px); font-weight:bold; letter-spacing:4px; text-align:center; }
.os { font-size:clamp(12px,3vw,16px); color:#aaa; text-align:center; letter-spacing:2px; line-height:1.6; }
.btn {
  background:transparent; border:2px solid #0ff; color:#0ff;
  font-family:'Courier New',monospace; font-size:clamp(14px,3vw,18px);
  font-weight:bold; letter-spacing:3px; padding:12px 36px;
  cursor:pointer; border-radius:4px; text-shadow:0 0 8px #0ff;
  box-shadow:0 0 16px #0ff,inset 0 0 16px rgba(0,255,255,0.1); margin-top:6px;
}
.btn:hover { background:rgba(0,255,255,0.15); }
.btn.red { border-color:#f44; color:#f44; text-shadow:0 0 8px #f44; box-shadow:0 0 16px #f44; }
.btn.gray { border-color:#555; color:#555; box-shadow:none; text-shadow:none; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="ui">
    <div class="ui-text" id="stageUI">STAGE: 01/100</div>
    <div class="ui-text" id="scoreUI">SCORE: 00000</div>
  </div>
  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <div id="flash"></div>
  <div id="overlay">
    <div class="ot" style="color:#0ff;text-shadow:0 0 20px #0ff,0 0 40px #0ff">NEON RUSH</div>
    <div class="os">링의 <span style="color:#0ff">틈</span>이 공 방향일 때 클릭!<br>오브를 맞히면 클리어</div>
    <button class="btn" onclick="startGame()">LAUNCH ▶</button>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W=600, H=600, CX=300, CY=300;
canvas.width=W; canvas.height=H;

const flashEl = document.getElementById('flash');
const overlay = document.getElementById('overlay');

let stage=1, score=0, combo=0, state='menu';
let rings=[], ball=null, particles=[], texts=[];
let orbPulse=0, orbFlash=0, shakePow=0, shakeX=0, shakeY=0;
let hitsNeeded=1, hitsDone=0;

function getDiff(s) {
  const t=(s-1)/99;
  return {
    ringCount: Math.min(1+Math.floor(s/25), 4),
    speed:     0.007 + t*0.026,
    gap:       0.95  - t*0.52,   // 갭 라디안 (크면 쉬움)
    hitsNeeded:1 + Math.floor(s/25)
  };
}

function initStage() {
  const d = getDiff(stage);
  rings=[]; particles=[]; texts=[]; ball=null; orbFlash=0;
  hitsDone=0; hitsNeeded=d.hitsNeeded;

  const radii =[90,140,190,240];
  const colors=['#0ff','#f0f','#ff0','#0f8'];

  for(let i=0;i<d.ringCount;i++){
    const dir=(i%2===0)?1:-1;
    rings.push({
      r:       radii[i],
      angle:   Math.random()*Math.PI*2,
      speed:   d.speed*(1+i*0.1)*dir,
      gap:     d.gap,
      gapOff:  Math.random()*Math.PI*2,  // 갭 위치 = angle + gapOff
      color:   colors[i],
      lw:      10-i*1.5
    });
  }
  spawnBall();
  updateUI();
}

function spawnBall() {
  const outerR = rings.length ? Math.max(...rings.map(r=>r.r)) : 90;
  const a = Math.random()*Math.PI*2;
  ball={
    x: CX+Math.cos(a)*(outerR+120),
    y: CY+Math.sin(a)*(outerR+120),
    vx:0, vy:0, r:7, moving:false, trail:[]
  };
}

function fireBall() {
  if(!ball||ball.moving||state!=='playing') return;
  const dx=CX-ball.x, dy=CY-ball.y, len=Math.hypot(dx,dy);
  ball.vx=dx/len*8; ball.vy=dy/len*8; ball.moving=true;
}

// ── 충돌 핵심 ────────────────────────────
// dist가 링 범위 안이고 갭 밖이면 충돌
function isRingHit(bx, by, ring) {
  const dx=bx-CX, dy=by-CY;
  const dist=Math.hypot(dx,dy);

  // 링 두께 범위 밖이면 무시
  if(Math.abs(dist-ring.r) > ring.lw/2+ball.r*0.3) return false;

  // 공의 절대 각도
  let ballAng = (Math.atan2(dy,dx)+Math.PI*4)%(Math.PI*2);

  // 갭 중심 절대 각도
  let gapAng = (ring.angle + ring.gapOff + Math.PI*4)%(Math.PI*2);

  // 각도 차이 (최소값)
  let diff = Math.abs(ballAng - gapAng);
  if(diff>Math.PI) diff=Math.PI*2-diff;

  // 갭 안이면 통과 (false)
  if(diff < ring.gap/2) return false;

  // 갭 밖이면 충돌 (true)
  return true;
}

function update() {
  if(state!=='playing') return;

  orbPulse+=0.06;
  if(orbFlash>0) orbFlash-=0.07;
  if(shakePow>0){ shakeX=(Math.random()-0.5)*shakePow; shakeY=(Math.random()-0.5)*shakePow; shakePow-=1.5; }
  else { shakeX=0; shakeY=0; }

  rings.forEach(r=>r.angle+=r.speed);

  if(ball&&ball.moving){
    ball.trail.push({x:ball.x,y:ball.y});
    if(ball.trail.length>12) ball.trail.shift();
    ball.x+=ball.vx; ball.y+=ball.vy;

    // 링 충돌
    for(let ring of rings){
      if(isRingHit(ball.x,ball.y,ring)){
        onFail(); return;
      }
    }

    // 오브 충돌
    if(Math.hypot(ball.x-CX,ball.y-CY)<22+ball.r){
      onHit(); return;
    }

    // 화면 너무 멀리
    const outerR=rings.length?Math.max(...rings.map(r=>r.r)):90;
    if(Math.hypot(ball.x-CX,ball.y-CY)>outerR+130){
      onFail(); return;
    }
  }

  particles=particles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.06; p.vx*=0.97; p.life--; p.r*=0.95;
    return p.life>0;
  });
  texts=texts.filter(t=>{ t.y-=1.2; t.life--; return t.life>0; });
}

function onHit() {
  hitsDone++; combo++;
  orbFlash=1;
  score+=100*combo*stage;
  burst(CX,CY,'#0ff',14);
  const lbs=['NICE!','GOOD!','GREAT!','PERFECT!','AMAZING!','GODLIKE!'];
  const li=Math.min(Math.floor((combo-1)/2),lbs.length-1);
  addText(combo>=3?`COMBO ×${combo}\n${lbs[li]}`:lbs[li],
    CX+(Math.random()-0.5)*60,CY-70,
    combo>=5?'#ff0':combo>=3?'#f0f':'#0ff', combo>=5?22:16);
  updateUI();

  if(hitsDone>=hitsNeeded){
    onStageClear();
  } else {
    setTimeout(()=>{ if(state==='playing') spawnBall(); },300);
  }
}

function onFail() {
  combo=0; shakePow=18;
  burst(ball.x,ball.y,'#f44',10);
  doFlash('rgba(255,0,0,0.5)');
  state='fail';
  setTimeout(showGameOver,700);
}

function onStageClear() {
  state='clear'; ball=null;
  score+=500*stage;
  burst(CX,CY,'#0ff',30); burst(CX,CY,'#ff0',20);
  doFlash('rgba(0,255,200,0.35)');
  addText(`STAGE ${stage}\nCLEARED!`,CX,CY-30,'#ff0',26);
  updateUI();
  setTimeout(()=>{
    texts=[];
    if(stage>=100){ showComplete(); return; }
    stage++; state='playing'; initStage();
  },1600);
}

function burst(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,color,life:35+Math.random()*25,r:3+Math.random()*3});
  }
}
function addText(text,x,y,color,size){ texts.push({text,x,y,color,size,life:60}); }
function doFlash(col){
  flashEl.style.background=col; flashEl.style.opacity='1'; flashEl.style.transition='';
  setTimeout(()=>{ flashEl.style.transition='opacity 0.5s'; flashEl.style.opacity='0'; },60);
  setTimeout(()=>{ flashEl.style.transition=''; },600);
}

function draw() {
  ctx.save();
  ctx.translate(shakeX,shakeY);

  // 배경
  ctx.fillStyle='#030308';
  ctx.fillRect(-20,-20,W+40,H+40);

  // 그리드
  ctx.strokeStyle='rgba(0,255,255,0.03)'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // 링
  rings.forEach(ring=>{
    ctx.save();
    ctx.translate(CX,CY);
    ctx.shadowColor=ring.color; ctx.shadowBlur=14;

    const gapCenter=(ring.angle+ring.gapOff+Math.PI*4)%(Math.PI*2);
    const gapStart=gapCenter-ring.gap/2;
    const gapEnd  =gapCenter+ring.gap/2;

    // 링 본체 (갭 제외)
    ctx.strokeStyle=ring.color; ctx.lineWidth=ring.lw; ctx.lineCap='round';
    ctx.beginPath();
    ctx.arc(0,0,ring.r,gapEnd,gapStart+Math.PI*2);
    ctx.stroke();

    // 갭 표시 (희미)
    ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(255,255,255,0.07)'; ctx.lineWidth=ring.lw;
    ctx.beginPath();
    ctx.arc(0,0,ring.r,gapStart,gapEnd);
    ctx.stroke();

    ctx.restore();
  });

  // 오브
  const pulse=Math.sin(orbPulse)*3;
  const or=22+pulse+orbFlash*7;
  ctx.save();
  ctx.shadowColor=orbFlash>0.3?'#fff':'#0ff';
  ctx.shadowBlur=18+orbFlash*25;
  const og=ctx.createRadialGradient(CX-4,CY-4,0,CX,CY,or);
  og.addColorStop(0,orbFlash>0.3?'#fff':'#8ff');
  og.addColorStop(0.6,orbFlash>0.3?'#ff0':'#0af');
  og.addColorStop(1,'#005');
  ctx.fillStyle=og;
  ctx.beginPath(); ctx.arc(CX,CY,or,0,Math.PI*2); ctx.fill();
  // 히트 카운터
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.beginPath(); ctx.arc(CX,CY,or*0.6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font=`bold ${or*0.55}px 'Courier New'`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(`${hitsDone}/${hitsNeeded}`,CX,CY);
  ctx.restore();

  // 파티클
  ctx.save();
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/60;
    ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1; ctx.shadowBlur=0;
  ctx.restore();

  // 공
  if(ball){
    // 트레일
    ball.trail.forEach((t,i)=>{
      ctx.globalAlpha=(i/ball.trail.length)*0.4;
      ctx.fillStyle='#0ff';
      ctx.beginPath(); ctx.arc(t.x,t.y,ball.r*(i/ball.trail.length)*0.6,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha=1;

    ctx.save();
    ctx.shadowColor='#0ff'; ctx.shadowBlur=14;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#0ff'; ctx.lineWidth=2.5; ctx.stroke();
    ctx.restore();

    if(!ball.moving){
      const dx=CX-ball.x,dy=CY-ball.y,len=Math.hypot(dx,dy);
      ctx.setLineDash([5,7]);
      ctx.strokeStyle='rgba(0,255,255,0.2)'; ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(ball.x,ball.y);
      ctx.lineTo(ball.x+dx/len*55,ball.y+dy/len*55);
      ctx.stroke();
      ctx.setLineDash([]);

      const pp=(Math.sin(orbPulse*2)+1)*5;
      ctx.strokeStyle='rgba(0,255,255,0.3)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r+pp,0,Math.PI*2); ctx.stroke();
    }
  }

  // 텍스트
  texts.forEach(t=>{
    ctx.globalAlpha=Math.min(1,t.life/15);
    ctx.fillStyle=t.color; ctx.shadowColor=t.color; ctx.shadowBlur=10;
    ctx.font=`bold ${t.size}px 'Courier New'`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    t.text.split('\n').forEach((line,i)=>ctx.fillText(line,t.x,t.y+i*(t.size+4)));
  });
  ctx.globalAlpha=1; ctx.shadowBlur=0;

  ctx.restore();
}

function updateUI(){
  document.getElementById('stageUI').textContent=`STAGE: ${String(stage).padStart(2,'0')}/100`;
  document.getElementById('scoreUI').textContent=`SCORE: ${String(score).padStart(5,'0')}`;
  document.getElementById('progress-bar').style.width=((stage-1)/99*100)+'%';
}

function showGameOver(){
  overlay.innerHTML=`
    <div class="ot" style="color:#f44;text-shadow:0 0 20px #f44">GAME OVER</div>
    <div class="os">STAGE: ${String(stage).padStart(2,'0')} / 100</div>
    <div class="os" style="color:#ff0;font-size:clamp(16px,4vw,22px)">SCORE: ${score.toLocaleString()}</div>
    <button class="btn red" onclick="retryStage()">RETRY</button>
    <button class="btn gray" onclick="goMenu()">MENU</button>
  `;
  overlay.style.display='flex';
}
function showComplete(){
  overlay.innerHTML=`
    <div class="ot" style="color:#ff0;text-shadow:0 0 20px #ff0">🏆 COMPLETE!</div>
    <div class="os" style="color:#0ff">ALL 100 STAGES CLEARED!</div>
    <div class="os" style="color:#ff0;font-size:clamp(16px,4vw,22px)">FINAL: ${score.toLocaleString()}</div>
    <button class="btn" onclick="startGame()">PLAY AGAIN</button>
  `;
  overlay.style.display='flex';
}
function goMenu(){
  stage=1;score=0;combo=0;state='menu';
  overlay.innerHTML=`
    <div class="ot" style="color:#0ff;text-shadow:0 0 20px #0ff,0 0 40px #0ff">NEON RUSH</div>
    <div class="os">링의 <span style="color:#0ff">틈</span>이 공 방향일 때 클릭!<br>오브를 맞히면 클리어</div>
    <button class="btn" onclick="startGame()">LAUNCH ▶</button>
  `;
  overlay.style.display='flex';
}
function startGame(){
  overlay.style.display='none';
  stage=1;score=0;combo=0;state='playing';
  initStage();
}
function retryStage(){
  overlay.style.display='none';
  state='playing'; initStage();
}

canvas.addEventListener('click',fireBall);
canvas.addEventListener('touchstart',e=>{e.preventDefault();fireBall();},{passive:false});

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
